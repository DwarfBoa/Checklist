<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checklists</title>
    <link rel="stylesheet" href="css/checklist.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap"
      rel="stylesheet" />
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  </head>
  <body>
    <div class="overlay"></div>
    <header>
      <h1>The Great Archive</h1>
    </header>

    <main>
      <section class="checklist-section">
        <h2>Movies/Shows</h2>
        <div class="box" id="moviesList"></div>
        <div class="add-item">
          <input
            type="text"
            id="newMovieInput"
            placeholder="Scribe a title..." />
          <button type="button" id="addMovieButton" class="button">Add</button>
        </div>
      </section>

      <section class="checklist-section">
        <h2>Activities</h2>
        <div class="box" id="activitiesList"></div>
        <div class="add-item">
          <input
            type="text"
            id="newActivityInput"
            placeholder="Scribe a deed..." />
          <button type="button" id="addActivityButton" class="button">
            Add
          </button>
        </div>
      </section>
    </main>

    <script src="js/checklist.js"></script>
  </body>
</html>
